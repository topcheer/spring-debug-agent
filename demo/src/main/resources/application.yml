spring:
  application:
    name: order-management-demo

  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

# Debug Agent Configuration
debug-agent:
  enabled: true
  base-path: /agent
  llm:
    # Use OpenAI-compatible endpoint. Works with:
    #   - https://api.openai.com/v1
    #   - http://localhost:11434/v1 (Ollama)
    #   - https://api.deepseek.com/v1
    #   - https://api.moonshot.cn/v1
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:your-api-key-here}
    model: ${LLM_MODEL:gpt-4o}
    temperature: 0.3
    max-tokens: 4096
    max-tool-rounds: 10
    timeout-seconds: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans

logging:
  level:
    com.debugagent: INFO
    com.demo: DEBUG
