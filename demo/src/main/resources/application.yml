spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: order-management-demo

  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27017/demo_db

  # Elasticsearch
  elasticsearch:
    uris: http://localhost:9200

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: demo-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Cloud Discovery (SimpleDiscoveryClient for demo)
  cloud:
    compatibility-verifier:
      enabled: false
    discovery:
      simple:
        instances:
          order-service:
            - uri: http://localhost:8080
              metadata:
                zone: zone1
                prefer-ip: true
          pricing-service:
            - uri: http://localhost:8081
              metadata:
                zone: zone1

  # Vault
  vault:
    uri: http://localhost:8200
    token: myroot
    scheme: http
    kv:
      enabled: true
      backend: secret
      default-context: order-db

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      orderService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      orderRetry:
        max-attempts: 3
        wait-duration: 1s
  ratelimiter:
    instances:
      orderRateLimit:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 0

server:
  port: 8080
  # TLS / mTLS demo config (for TlsInspector — present but not switching HTTP to HTTPS)
  ssl:
    enabled: false
    key-store: classpath:demo-keystore.p12
    key-store-password: demopass
    key-store-type: PKCS12
    key-alias: demo-server
    enabled-protocols: TLSv1.2,TLSv1.3
    ciphers: TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256
    client-auth: want

# Debug Agent Configuration
debug-agent:
  enabled: true
  base-path: /agent
  llm:
    # Use OpenAI-compatible endpoint. Works with:
    #   - https://api.openai.com/v1
    #   - http://localhost:11434/v1 (Ollama)
    #   - https://api.deepseek.com/v1
    #   - https://api.moonshot.cn/v1
    base-url: ${LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${LLM_API_KEY:your-api-key-here}
    model: ${LLM_MODEL:gpt-4o}
    temperature: 0.3
    max-tokens: 4096
    max-tool-rounds: 25
    timeout-seconds: 120

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,prometheus

logging:
  level:
    com.debugagent: INFO
    com.demo: DEBUG

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
