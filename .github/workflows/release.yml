name: Release to Maven Central

# Trigger: push a tag like v0.2.0, or manual dispatch
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # for creating GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip 'v' prefix from tag name (v0.2.0 -> 0.2.0)
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Update version in POMs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update agent/pom.xml version (standalone, no parent)
          mvn versions:set -DnewVersion=$VERSION -pl agent -q
          # Update demo/pom.xml (parent + agent dependency)
          mvn versions:set -DnewVersion=$VERSION -pl demo -q
          # Update demo's agent dependency version
          sed -i "s|<version>.*</version>|<version>$VERSION</version>|" demo/pom.xml
          # Verify the change
          echo "=== Agent POM version ==="
          grep -m1 "<version>" agent/pom.xml

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --dearmor --output /tmp/signing-key.gpg
          gpg --batch --import /tmp/signing-key.gpg
          echo "GPG key imported successfully"
          gpg --list-secret-keys --keyid-format=long

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.SONATYPE_USERNAME}</username>
                <password>${env.SONATYPE_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}

      - name: Build and Deploy
        run: |
          mvn clean deploy -DskipTests -pl agent \
            -Prelease \
            -Dgpg.passphrase="" \
            2>&1
        env:
          MAVEN_OPTS: "-Xmx2g"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: ${{ format('v{0}', steps.version.outputs.version) }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          body: |
            ## Maven Central

            ```xml
            <dependency>
              <groupId>dev.ggcode</groupId>
              <artifactId>spring-debug-agent</artifactId>
              <version>${{ steps.version.outputs.version }}</version>
            </dependency>
            ```
